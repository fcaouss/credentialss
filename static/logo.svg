<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3abf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8edf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bac3d1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M100 18 L168 46 L168 100 C168 140 138 168 100 182 C62 168 32 140 32 100 L32 46 Z"
        fill="url(#shieldGrad)" opacity="0.15" />

  <!-- Shield outline -->
  <path d="M100 18 L168 46 L168 100 C168 140 138 168 100 182 C62 168 32 140 32 100 L32 46 Z"
        fill="none" stroke="url(#keyGrad)" stroke-width="2.5" opacity="0.6" />

  <!-- Inner shield fill -->
  <path d="M100 30 L156 53 L156 100 C156 133 131 157 100 170 C69 157 44 133 44 100 L44 53 Z"
        fill="url(#shieldGrad)" opacity="0.9" />

  <!-- Key circle -->
  <circle cx="92" cy="95" r="22" fill="none" stroke="url(#keyGrad)" stroke-width="7" opacity="0.95" />

  <!-- Key stem -->
  <line x1="114" y1="95" x2="148" y2="95" stroke="url(#keyGrad)" stroke-width="7" stroke-linecap="round" opacity="0.95" />

  <!-- Key teeth -->
  <line x1="138" y1="95" x2="138" y2="108" stroke="url(#keyGrad)" stroke-width="7" stroke-linecap="round" opacity="0.95" />
  <line x1="125" y1="95" x2="125" y2="105" stroke="url(#keyGrad)" stroke-width="7" stroke-linecap="round" opacity="0.95" />

  <!-- Key hole -->
  <circle cx="92" cy="95" r="8" fill="#071828" opacity="0.95" />
</svg>
